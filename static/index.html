<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Live AI Wrapper Test</title>
    <script type="module" src="/gemilive-js/index.js?v=20260415"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .log-container { height: 400px; overflow-y: auto; background: #f5f5f5; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .msg.user { background: #e3f2fd; margin-left: auto; }
        .msg.ai { background: #fff; border: 1px solid #ddd; }
        .msg.system { color: #666; font-size: 0.9em; text-align: center; max-width: 100%; }
        input, button, select { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #1976d2; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.stop { background: #d32f2f; }
        button.cam-off { background: #555; }
        .config-panel { background: #fff5e6; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffe0b2; }
        .config-panel label { display: block; margin-bottom: 8px; font-weight: bold; }
        .config-panel input { width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .video-panel { display: none; margin-bottom: 20px; }
        .video-panel.active { display: block; }
        .video-wrapper { position: relative; display: inline-block; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.15); background: #000; }
        #videoPreview { display: block; width: 100%; max-width: 480px; height: auto; border-radius: 12px; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #d32f2f; color: white; font-size: 0.7em; font-weight: bold; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.08em; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .video-label { font-size: 0.8em; color: #666; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>Live AI Testing Panel</h1>
    
    <div class="config-panel">
        <label>App Token:</label>
        <input type="text" id="token" value="app_token_1" placeholder="Enter App Token configured in .env">
        <label>System Prompt:</label>
        <input type="text" id="systemPrompt" value="You are a helpful assistant. Keep your responses very brief and practical." placeholder="Enter System Prompt">
    </div>

    <div class="controls">
        <button id="btnConnect">Connect</button>
        <button id="btnDisconnect" class="stop" disabled>Disconnect</button>
        <button id="btnToggleCamera" disabled>📷 Camera: ON</button>
    </div>

    <div class="controls">
        <input type="text" id="txtInput" placeholder="Type a message..." style="flex: 1" disabled>
        <button id="btnSend" disabled>Send</button>
    </div>

    <div class="video-panel" id="videoPanel">
        <div class="video-wrapper">
            <video id="videoPreview" autoplay muted playsinline></video>
            <span class="live-badge">● LIVE</span>
        </div>
        <div class="video-label">📷 Camera preview — what the AI sees</div>
    </div>

    <div class="log-container" id="log"></div>

    <script>
        let client = null;
        let aiMessageBuffer = "";
        let videoEnabled = true;
        const logPanel = document.getElementById('log');
        const btnConnect = document.getElementById('btnConnect');
        const btnDisconnect = document.getElementById('btnDisconnect');
        const btnToggleCamera = document.getElementById('btnToggleCamera');
        const btnSend = document.getElementById('btnSend');
        const txtInput = document.getElementById('txtInput');

        function appendLog(text, role) {
            const el = document.createElement('div');
            el.className = `msg ${role}`;
            el.innerText = text;
            logPanel.appendChild(el);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        async function initConnection() {
            const token = document.getElementById('token').value;
            const systemPrompt = document.getElementById('systemPrompt').value;

            if (!navigator?.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== "function") {
                const secureHint = !window.isSecureContext
                    ? "Open this page on HTTPS (or localhost) to enable camera/mic."
                    : "Your browser does not expose camera/mic APIs in this context.";
                appendLog(`Media unavailable: ${secureHint}`, "system");
                return;
            }
            
            // Match page protocol to avoid mixed-content failures on HTTPS.
            const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/live`;
            
            client = new GemiliveClient(wsUrl, { token, systemPrompt });
            
            appendLog("Connecting...", "system");
            
            client.onMessage = (text) => {
                // Buffer the text or create new bubble
                if (!aiMessageBuffer) {
                    const el = document.createElement('div');
                    el.className = `msg ai`;
                    el.id = "current-ai-msg";
                    logPanel.appendChild(el);
                }
                const aiEl = document.getElementById('current-ai-msg');
                if (aiEl) {
                    aiMessageBuffer += text;
                    aiEl.innerText = aiMessageBuffer;
                    logPanel.scrollTop = logPanel.scrollHeight;
                }
            };

            client.onError = (e) => {
                appendLog(`Error: ${e.message || 'Connection failed'}`, "system");
                toggleState(false);
            };

            client.onClose = () => {
                appendLog("Disconnected", "system");
                toggleState(false);
            };


            try {
                await client.start();
                appendLog("Connected!", "system");

                // Show camera preview
                document.getElementById('videoPreview').srcObject = client.stream;
                document.getElementById('videoPanel').classList.add('active');

                // Intercept turn_complete to finalize the AI message bubble
                const onMessage = client.websocket.onmessage;
                client.websocket.onmessage = (ev) => {
                    const d = JSON.parse(ev.data);
                    if (d.type === 'turn_complete') {
                        aiMessageBuffer = "";
                        const m = document.getElementById('current-ai-msg');
                        if (m) m.id = "";
                    }
                    onMessage(ev);
                };

                toggleState(true);
            } catch (e) {
                appendLog(`Failed to start media/connection: ${e.message || "unknown error"}`, "system");
            }
        }

        function toggleState(connected) {
            btnConnect.disabled = connected;
            btnDisconnect.disabled = !connected;
            btnToggleCamera.disabled = !connected;
            btnSend.disabled = !connected;
            txtInput.disabled = !connected;
            if (!connected) {
                // Reset camera toggle state on disconnect
                videoEnabled = true;
                btnToggleCamera.textContent = "📷 Camera: ON";
                btnToggleCamera.classList.remove('cam-off');
            }
        }

        btnConnect.onclick = () => initConnection();

        btnToggleCamera.onclick = () => {
            if (!client) return;
            videoEnabled = !videoEnabled;
            client.toggleVideo(videoEnabled);
            btnToggleCamera.textContent = videoEnabled ? "📷 Camera: ON" : "📷 Camera: OFF";
            btnToggleCamera.classList.toggle('cam-off', !videoEnabled);
            document.getElementById('videoPanel').classList.toggle('active', videoEnabled);
        };
        
        btnDisconnect.onclick = () => {
            if (client) {
                client.stop();
                client = null;
            }
            document.getElementById('videoPreview').srcObject = null;
            document.getElementById('videoPanel').classList.remove('active');
            toggleState(false);
        };

        function sendMessage() {
            const txt = txtInput.value.trim();
            if (txt && client) {
                client.sendText(txt);
                appendLog(txt, "user");
                txtInput.value = "";
                aiMessageBuffer = ""; // Clear on new message mapping
            }
        }

        btnSend.onclick = sendMessage;
        txtInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

    </script>
</body>
</html>
